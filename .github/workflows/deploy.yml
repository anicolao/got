name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: pages-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
      - run: npm ci
      - name: Determine base path
        id: base_path
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            echo "path=/got/pr${{ github.event.pull_request.number }}" >> "$GITHUB_OUTPUT"
            echo "dir=pr${{ github.event.pull_request.number }}" >> "$GITHUB_OUTPUT"
          else
            echo "path=/got" >> "$GITHUB_OUTPUT"
            echo "dir=" >> "$GITHUB_OUTPUT"
          fi
      - run: npm run build
        env:
          NODE_ENV: production
          PUBLIC_BASE_PATH: ${{ steps.base_path.outputs.path }}
      - name: Deploy production
        if: github.event_name != 'pull_request'
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./build
          keep_files: true
      - name: Deploy PR preview
        if: github.event_name == 'pull_request'
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./build
          destination_dir: ${{ steps.base_path.outputs.dir }}
          keep_files: true
      - name: Comment PR preview URL
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const prNumber = context.payload.pull_request.number;
            const previewUrl = `https://${context.repo.owner}.github.io/${context.repo.repo}/pr${prNumber}/`;
            const body = `Preview deployed to: ${previewUrl}`;
            const comments = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber
            });
            const existing = comments.data.find(comment =>
              comment.user.login === 'github-actions[bot]' && comment.body.includes('Preview deployed to:')
            );
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prNumber,
                body
              });
            }
